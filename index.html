<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1e7a42"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="홈트레이닝"/>
<title>55세+ 홈트레이닝</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<style>
:root {
  --green:#1e7a42; --green-dark:#165e32; --green-light:#f0faf4;
  --green-mid:#2d9b58; --green-border:#7ec49e;
  --blue:#3a82d8; --blue-light:#f0f6ff; --blue-border:#90b8f0;
  --orange:#e07820; --orange-light:#fff7f0; --orange-border:#f0b87e;
  --bg:#f4f6f4; --surface:#ffffff;
  --border:#e2e8e4; --border-strong:#c8d5cc;
  --text:#1a2b1e; --text-2:#4a6052; --text-3:#7a9080;
  --radius:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);overscroll-behavior:none;}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* HEADER */
.hdr{background:var(--green);padding:calc(var(--safe-top) + 14px) 20px 0;flex-shrink:0;}
.hdr-row{display:flex;align-items:center;gap:12px;padding-bottom:10px;}
.hdr-icon{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-size:17px;font-weight:600;color:#fff;line-height:1.3;}
.hdr-sub{font-size:13px;color:rgba(255,255,255,0.72);margin-top:3px;}

/* 전체 운동 타이머 */
.total-timer{background:rgba(255,255,255,0.13);border-radius:12px;padding:9px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.total-timer-left{display:flex;align-items:center;gap:8px;}
.total-timer-label{font-size:12px;color:rgba(255,255,255,0.8);}
.total-timer-time{font-size:20px;font-weight:700;color:#fff;letter-spacing:0.04em;font-variant-numeric:tabular-nums;}
.total-timer-btn{padding:6px 14px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.total-timer-btn.start{background:#fff;color:var(--green);}
.total-timer-btn.stop{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);}
.total-timer-btn.reset-t{background:transparent;color:rgba(255,255,255,0.6);font-size:12px;padding:6px 8px;}

/* PROGRESS */
.prog-wrap{background:rgba(255,255,255,0.14);border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.prog-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.28);border-radius:4px;overflow:hidden;}
.prog-bar-fg{height:100%;background:#fff;border-radius:4px;transition:width 0.4s ease;}
.prog-pct{font-size:13px;color:rgba(255,255,255,0.9);min-width:34px;text-align:right;}

/* NAV */
.nav{display:flex;background:var(--green);gap:4px;padding:0 16px;}
.nav-btn{flex:1;padding:10px 6px;font-size:13px;font-family:inherit;border:none;cursor:pointer;border-radius:12px 12px 0 0;background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.72);transition:all 0.15s;font-weight:500;}
.nav-btn.active{background:var(--bg);color:var(--green);font-weight:600;}

/* BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 24px);}

.sec-lbl{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.06em;text-transform:uppercase;padding:16px 20px 8px;}

/* EXERCISE ITEMS */
.ex-list{padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.ex-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;user-select:none;-webkit-user-select:none;}
.ex-item:active{transform:scale(0.98);}
.ex-item.on{background:var(--green-light);border-color:var(--green-border);}
.ex-num{font-size:12px;font-weight:600;color:var(--text-3);min-width:18px;text-align:center;}
.ex-item.on .ex-num{color:var(--green-mid);}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.ex-item.on .chk{background:var(--green-mid);border-color:var(--green-mid);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;}
.ex-item.on .ex-name{color:var(--green-dark);text-decoration:line-through;text-decoration-color:var(--green-border);}
.ex-reps{font-size:12px;color:var(--text-3);margin-top:2px;}

/* 항목별 타이머 버튼 */
.item-timer-btn{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;font-size:16px;}
.item-timer-btn:active{transform:scale(0.9);}
.item-timer-btn.running{background:var(--orange-light);border-color:var(--orange-border);}
.item-timer-btn.done-t{background:#e8f7ef;border-color:var(--green-border);}

/* 타이머 모달 */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.timer-overlay.open{display:flex;}
.timer-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px calc(var(--safe-bottom) + 32px);width:100%;max-width:480px;}
.timer-sheet-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 20px;}
.timer-ex-name{font-size:15px;font-weight:600;color:var(--text);text-align:center;margin-bottom:4px;}
.timer-ex-reps{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:24px;}

/* 원형 타이머 */
.timer-circle-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative;}
.timer-svg{transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--border);stroke-width:8;}
.timer-fill{fill:none;stroke:var(--green);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear;stroke-dasharray:502;}
.timer-fill.urgent{stroke:#e05252;}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-display{font-size:48px;font-weight:700;color:var(--text);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
.timer-display.urgent{color:#e05252;}
.timer-set-info{font-size:13px;color:var(--text-3);margin-top:4px;}

/* 세트 조절 */
.timer-set-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px;}
.set-adj-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--bg);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.set-adj-btn:active{background:var(--border);}
.set-count{font-size:16px;font-weight:600;color:var(--text);min-width:80px;text-align:center;}

/* 시간 조절 */
.timer-time-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;}
.time-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all 0.15s;}
.time-chip.active{background:var(--green);border-color:var(--green);color:#fff;}

/* 타이머 컨트롤 버튼 */
.timer-controls{display:flex;gap:10px;}
.timer-ctrl-btn{flex:1;padding:15px;border-radius:14px;border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.timer-ctrl-btn:active{transform:scale(0.97);}
.btn-start{background:var(--green);color:#fff;}
.btn-pause{background:var(--orange-light);color:var(--orange);border:1.5px solid var(--orange-border);}
.btn-reset{background:var(--bg);color:var(--text-2);border:1.5px solid var(--border-strong);}
.btn-close{background:var(--bg);color:var(--text-2);border:1.5px solid var(--border-strong);}
.btn-next{background:var(--green-light);color:var(--green-dark);border:1.5px solid var(--green-border);}

/* 완료 배너 */
.done-banner{margin:12px 16px 0;padding:13px 16px;background:var(--green-light);border:1px solid var(--green-border);border-radius:14px;display:none;align-items:center;gap:12px;}
.done-banner.show{display:flex;}
.done-t{font-size:14px;color:var(--green-dark);font-weight:600;}
.done-s{font-size:12px;color:#3d8b5e;margin-top:3px;}

/* 통계 */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px 0;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
.stat-num{font-size:20px;font-weight:600;color:var(--green);}
.stat-lbl{font-size:11px;color:var(--text-3);margin-top:3px;}

.reset-row{display:flex;justify-content:flex-end;padding:12px 16px 0;}
.reset-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface);font-family:inherit;font-size:13px;color:var(--text-2);cursor:pointer;}

/* CALENDAR */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;}
.month-title{font-size:16px;font-weight:600;color:var(--text);}
.month-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text-2);}
.cal-wrap{padding:0 16px;}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-hdr-cell{text-align:center;font-size:12px;font-weight:600;color:var(--text-3);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:all 0.12s;user-select:none;}
.cal-cell:active{transform:scale(0.92);}
.cal-cell.empty{border-color:transparent;background:transparent;cursor:default;}
.cal-cell.today{border-color:var(--green-mid);color:var(--green);font-weight:700;}
.cal-cell.workout{background:var(--green);border-color:var(--green);color:#fff;font-weight:600;}
.cal-cell.rest-day{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.cal-legend{display:flex;gap:16px;padding:12px 20px;align-items:center;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);}
.leg-dot{width:12px;height:12px;border-radius:50%;}
.cal-hint{margin:0 16px 12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:12px;color:var(--text-3);line-height:1.6;}

/* REST */
.rest-list{padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.rest-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;user-select:none;transition:all 0.15s;}
.rest-item:active{transform:scale(0.98);}
.rest-item.on{background:var(--blue-light);border-color:var(--blue-border);}
.chk-sq{width:24px;height:24px;border-radius:7px;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.rest-item.on .chk-sq{background:var(--blue);border-color:var(--blue);}
.rest-name{font-size:15px;font-weight:500;color:var(--text);}
.rest-item.on .rest-name{color:#1a50a0;}
.rest-icon{font-size:20px;}
textarea.memo{width:100%;height:90px;border-radius:14px;border:1px solid var(--border);background:var(--surface);padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);resize:none;outline:none;line-height:1.6;}
textarea.memo:focus{border-color:var(--green-mid);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-icon">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="7" r="3.2" fill="white"/>
          <path d="M9 13.5C9 12.1 10.1 11 11.5 11H18.5C19.9 11 21 12.1 21 13.5V20H9V13.5Z" fill="white" opacity="0.9"/>
          <rect x="11.5" y="20" width="2" height="5" rx="1" fill="white" opacity="0.85"/>
          <rect x="16.5" y="20" width="2" height="5" rx="1" fill="white" opacity="0.85"/>
          <path d="M5 14.5L9 16.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M25 14.5L21 16.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="3.5" cy="14.5" r="2" fill="white" opacity="0.8"/>
          <circle cx="26.5" cy="14.5" r="2" fill="white" opacity="0.8"/>
        </svg>
      </div>
      <div>
        <div class="hdr-title">55세+ 홈트레이닝</div>
        <div class="hdr-sub" id="today-txt"></div>
      </div>
    </div>
    <!-- 전체 운동 타이머 -->
    <div class="total-timer" id="total-timer-wrap" style="display:none;">
      <div class="total-timer-left">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <path d="M8 5V8.5L10.5 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="total-timer-label">총 운동시간</span>
      </div>
      <span class="total-timer-time" id="total-time-display">00:00</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="total-timer-btn stop" id="total-pause-btn" onclick="toggleTotalTimer()">일시정지</button>
        <button class="total-timer-btn reset-t" onclick="resetTotalTimer()">↺</button>
      </div>
    </div>
    <div class="prog-wrap" id="prog-wrap" style="display:none;">
      <div class="prog-bar-bg"><div class="prog-bar-fg" id="prog-fg" style="width:0%"></div></div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="showTab('workout',this)">오늘 운동</button>
      <button class="nav-btn" onclick="showTab('calendar',this)">요일 기록</button>
      <button class="nav-btn" onclick="showTab('rest',this)">휴식일</button>
    </div>
  </div>

  <div class="body">
    <!-- TAB: WORKOUT -->
    <div id="tab-workout">
      <div class="sec-lbl">운동 목록</div>
      <div class="ex-list" id="ex-list"></div>
      <div class="done-banner" id="done-banner">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#2d9b58"/>
          <path d="M7 12L10.5 15.5L17 8.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div><div class="done-t">오늘 운동 완료! 🎉</div><div class="done-s">정말 수고하셨어요.</div></div>
      </div>
      <div class="stats">
        <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-lbl">완료</div></div>
        <div class="stat-card"><div class="stat-num" id="s-left">9</div><div class="stat-lbl">남음</div></div>
        <div class="stat-card"><div class="stat-num" id="s-pct">0%</div><div class="stat-lbl">달성률</div></div>
      </div>
      <div class="reset-row"><button class="reset-btn" onclick="resetWorkout()">오늘 초기화</button></div>
    </div>

    <!-- TAB: CALENDAR -->
    <div id="tab-calendar" style="display:none;">
      <div class="month-nav">
        <button class="month-btn" onclick="moveMonth(-1)">‹</button>
        <div class="month-title" id="month-title"></div>
        <button class="month-btn" onclick="moveMonth(1)">›</button>
      </div>
      <div class="cal-wrap">
        <div class="cal-hdr">
          <div class="cal-hdr-cell" style="color:#e05252;">일</div>
          <div class="cal-hdr-cell">월</div><div class="cal-hdr-cell">화</div>
          <div class="cal-hdr-cell">수</div><div class="cal-hdr-cell">목</div>
          <div class="cal-hdr-cell">금</div>
          <div class="cal-hdr-cell" style="color:#3a82d8;">토</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="cal-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>운동일</div>
        <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>휴식일</div>
        <div class="leg"><div class="leg-dot" style="background:var(--surface);border:1px solid var(--border-strong)"></div>미기록</div>
      </div>
      <div class="cal-hint">날짜를 탭하면 <b>운동일 → 휴식일 → 초기화</b> 순으로 전환됩니다.</div>
      <div class="reset-row"><button class="reset-btn" onclick="resetMonth()">이달 초기화</button></div>
    </div>

    <!-- TAB: REST -->
    <div id="tab-rest" style="display:none;">
      <div class="sec-lbl">오늘의 휴식 선택</div>
      <div class="rest-list" id="rest-list"></div>
      <div class="sec-lbl" style="margin-top:8px;">컨디션 메모</div>
      <div style="padding:0 16px;">
        <textarea class="memo" id="rest-memo" placeholder="오늘 컨디션이나 특이사항을 적어두세요" oninput="saveMemo()"></textarea>
      </div>
      <div class="reset-row"><button class="reset-btn" onclick="resetRest()">휴식 초기화</button></div>
    </div>
  </div>
</div>

<!-- 타이머 모달 -->
<div class="timer-overlay" id="timer-overlay" onclick="overlayClose(event)">
  <div class="timer-sheet">
    <div class="timer-sheet-handle"></div>
    <div class="timer-ex-name" id="tm-name"></div>
    <div class="timer-ex-reps" id="tm-reps"></div>

    <!-- 원형 타이머 -->
    <div class="timer-circle-wrap">
      <svg class="timer-svg" width="180" height="180" viewBox="0 0 180 180">
        <circle class="timer-track" cx="90" cy="90" r="80"/>
        <circle class="timer-fill" id="tm-fill" cx="90" cy="90" r="80"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="tm-display">00:00</div>
        <div class="timer-set-info" id="tm-set-info"></div>
      </div>
    </div>

    <!-- 시간 프리셋 -->
    <div class="timer-time-row" id="tm-presets">
      <div class="time-chip" onclick="setPreset(20)">20초</div>
      <div class="time-chip" onclick="setPreset(30)">30초</div>
      <div class="time-chip" onclick="setPreset(60)">1분</div>
      <div class="time-chip" onclick="setPreset(300)">5분</div>
    </div>

    <!-- 세트 조절 -->
    <div class="timer-set-row" id="tm-set-row">
      <button class="set-adj-btn" onclick="adjSet(-1)">−</button>
      <div class="set-count" id="tm-set-count">1 / 3 세트</div>
      <button class="set-adj-btn" onclick="adjSet(1)">+</button>
    </div>

    <!-- 컨트롤 버튼 -->
    <div class="timer-controls" id="tm-controls"></div>
  </div>
</div>

<script>
const EX = [
  {id:'e1', name:'준비운동', reps:'5분', defaultSec:300, sets:1},
  {id:'e2', name:'의자 스쿼트', reps:'15회 × 3세트', defaultSec:0, sets:3},
  {id:'e3', name:'벽 푸쉬업', reps:'15회 × 3세트', defaultSec:0, sets:3},
  {id:'e4', name:'덤벨 로우', reps:'15회 × 3세트', defaultSec:0, sets:3},
  {id:'e5', name:'덤벨 숄더프레스', reps:'12회 × 3세트', defaultSec:0, sets:3},
  {id:'e6', name:'플랭크', reps:'20~30초 × 3세트', defaultSec:30, sets:3},
  {id:'e7', name:'버드독', reps:'좌우 10회 × 3세트', defaultSec:0, sets:3},
  {id:'e8', name:'브릿지', reps:'15회 × 3세트', defaultSec:0, sets:3},
  {id:'e9', name:'마무리 스트레칭', reps:'5분', defaultSec:300, sets:1},
];
const REST_OPTS = [{id:'r1',name:'가벼운 산책',icon:'🚶'},{id:'r2',name:'휴식 취하기',icon:'💤'}];

let S = {};
try{S=JSON.parse(localStorage.getItem('ht55_pwa')||'{}');}catch(e){S={};}
const save=()=>{try{localStorage.setItem('ht55_pwa',JSON.stringify(S));}catch(e){}};
const get=k=>!!S[k];
const tog=(k)=>{S[k]=!S[k];save();render();};

const now=new Date();
const TODAY_KEY=`cal_${now.getFullYear()}_${now.getMonth()+1}_${now.getDate()}`;
const WD=['일','월','화','수','목','금','토'];
let viewYear=now.getFullYear(), viewMonth=now.getMonth();

document.getElementById('today-txt').textContent=
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${WD[now.getDay()]})`;

// ── 전체 운동 타이머 ──
let totalSec=0, totalRunning=false, totalInterval=null;

function startTotalTimer(){
  if(totalRunning) return;
  totalRunning=true;
  document.getElementById('total-timer-wrap').style.display='';
  document.getElementById('total-pause-btn').textContent='일시정지';
  totalInterval=setInterval(()=>{
    totalSec++;
    updateTotalDisplay();
  },1000);
}
function toggleTotalTimer(){
  if(totalRunning){
    clearInterval(totalInterval); totalRunning=false;
    document.getElementById('total-pause-btn').textContent='재시작';
  } else {
    startTotalTimer();
  }
}
function resetTotalTimer(){
  clearInterval(totalInterval); totalRunning=false; totalSec=0;
  document.getElementById('total-timer-wrap').style.display='none';
  updateTotalDisplay();
}
function updateTotalDisplay(){
  const m=Math.floor(totalSec/60), s=totalSec%60;
  document.getElementById('total-time-display').textContent=
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

// ── 항목 타이머 ──
let tmEx=null, tmSec=0, tmTotal=0, tmRunning=false, tmInterval=null;
let tmCurrentSet=1, tmTotalSets=3;
const CIRCUM=2*Math.PI*80; // 502.65

function openTimer(ex){
  tmEx=ex;
  tmSec=ex.defaultSec||30;
  tmTotal=tmSec;
  tmRunning=false;
  tmCurrentSet=1;
  tmTotalSets=ex.sets||3;
  clearInterval(tmInterval);
  updateTimerUI();
  document.getElementById('timer-overlay').classList.add('open');
  // 프리셋 활성화
  document.querySelectorAll('.time-chip').forEach(c=>{
    c.classList.toggle('active', parseInt(c.dataset.sec||c.textContent)=== tmSec ||
      (c.textContent==='20초'&&tmSec===20)||(c.textContent==='30초'&&tmSec===30)||
      (c.textContent==='1분'&&tmSec===60)||(c.textContent==='5분'&&tmSec===300));
  });
  highlightPreset(tmSec);
  // 세트 행 표시 여부
  document.getElementById('tm-set-row').style.display = ex.sets>1 ? '' : 'none';
  document.getElementById('tm-presets').style.display = ex.defaultSec>0 ? '' : 'none';
}

function setPreset(sec){
  if(tmRunning) return;
  tmSec=sec; tmTotal=sec;
  highlightPreset(sec);
  updateTimerUI();
}
function highlightPreset(sec){
  document.querySelectorAll('.time-chip').forEach(c=>{
    const map={'20초':20,'30초':30,'1분':60,'5분':300};
    c.classList.toggle('active', map[c.textContent]===sec);
  });
}

function adjSet(d){
  if(tmRunning) return;
  tmCurrentSet=Math.max(1,Math.min(tmTotalSets, tmCurrentSet+d));
  updateTimerUI();
}

function updateTimerUI(){
  document.getElementById('tm-name').textContent = tmEx ? tmEx.name : '';
  document.getElementById('tm-reps').textContent = tmEx ? tmEx.reps : '';
  const m=Math.floor(tmSec/60), s=tmSec%60;
  const disp=document.getElementById('tm-display');
  disp.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  disp.className='timer-display'+(tmSec<=10&&tmTotal>10?' urgent':'');
  // 원형 게이지
  const fill=document.getElementById('tm-fill');
  const ratio= tmTotal>0 ? tmSec/tmTotal : 1;
  fill.style.strokeDashoffset= CIRCUM*(1-ratio);
  fill.className='timer-fill'+(tmSec<=10&&tmTotal>10?' urgent':'');
  // 세트
  document.getElementById('tm-set-count').textContent=`${tmCurrentSet} / ${tmTotalSets} 세트`;
  document.getElementById('tm-set-info').textContent= tmTotalSets>1 ? `${tmCurrentSet}세트` : '';
  // 버튼
  const ctrl=document.getElementById('tm-controls');
  if(!tmRunning && tmSec===tmTotal){
    ctrl.innerHTML=`
      <button class="timer-ctrl-btn btn-close" onclick="closeTimer()">닫기</button>
      <button class="timer-ctrl-btn btn-start" onclick="startItemTimer()">▶ 시작</button>`;
  } else if(tmRunning){
    ctrl.innerHTML=`
      <button class="timer-ctrl-btn btn-reset" onclick="resetItemTimer()">↺ 초기화</button>
      <button class="timer-ctrl-btn btn-pause" onclick="pauseItemTimer()">⏸ 일시정지</button>`;
  } else if(tmSec===0){
    ctrl.innerHTML=`
      <button class="timer-ctrl-btn btn-close" onclick="closeTimer()">닫기</button>
      ${tmCurrentSet<tmTotalSets
        ? `<button class="timer-ctrl-btn btn-next" onclick="nextSet()">다음 세트 ▶</button>`
        : `<button class="timer-ctrl-btn btn-start" onclick="markDoneClose()">✔ 완료 체크</button>`}`;
  } else {
    ctrl.innerHTML=`
      <button class="timer-ctrl-btn btn-reset" onclick="resetItemTimer()">↺ 초기화</button>
      <button class="timer-ctrl-btn btn-start" onclick="startItemTimer()">▶ 재시작</button>`;
  }
}

function startItemTimer(){
  if(!totalRunning) startTotalTimer();
  tmRunning=true;
  clearInterval(tmInterval);
  tmInterval=setInterval(()=>{
    tmSec--;
    updateTimerUI();
    if(tmSec<=0){
      clearInterval(tmInterval); tmRunning=false;
      vibrate(); beep();
      updateTimerUI();
    }
  },1000);
  updateTimerUI();
}
function pauseItemTimer(){ clearInterval(tmInterval); tmRunning=false; updateTimerUI(); }
function resetItemTimer(){ clearInterval(tmInterval); tmRunning=false; tmSec=tmTotal; updateTimerUI(); }
function nextSet(){ tmCurrentSet++; tmSec=tmTotal; tmRunning=false; clearInterval(tmInterval); updateTimerUI(); }
function closeTimer(){ clearInterval(tmInterval); tmRunning=false; document.getElementById('timer-overlay').classList.remove('open'); }
function markDoneClose(){
  if(tmEx) tog(tmEx.id);
  closeTimer();
}
function overlayClose(e){ if(e.target===document.getElementById('timer-overlay')) closeTimer(); }

// ── 진동+소리 ──
function vibrate(){
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const play=(freq,start,dur)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.4,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start); o.stop(ctx.currentTime+start+dur);
    };
    play(880,0,0.15); play(1100,0.2,0.15); play(1320,0.4,0.3);
  }catch(e){}
}

// ── TABS ──
function showTab(name,btn){
  ['workout','calendar','rest'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('prog-wrap').style.display=name==='workout'?'':'none';
  document.getElementById('total-timer-wrap').style.display=
    name==='workout'&&totalSec>0?'':'none';
  if(name==='calendar') renderCal();
}

// ── WORKOUT ──
function renderWorkout(){
  const list=document.getElementById('ex-list');
  list.innerHTML='';
  let done=0;
  EX.forEach((ex,i)=>{
    const on=get(ex.id);
    if(on) done++;
    const d=document.createElement('div');
    d.className='ex-item'+(on?' on':'');
    d.innerHTML=`
      <div class="ex-num">${i+1}</div>
      <div class="chk" onclick="tog('${ex.id}');event.stopPropagation()">
        ${on?'<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5L5.5 9.5L10.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      </div>
      <div class="ex-info" onclick="tog('${ex.id}');event.stopPropagation()">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-reps">${ex.reps}</div>
      </div>
      <div class="item-timer-btn ${on?'done-t':''}" onclick="openTimer(EX[${i}]);event.stopPropagation()" title="타이머">
        ${on?'✓':'⏱'}
      </div>`;
    list.appendChild(d);
  });
  const total=EX.length, pct=Math.round(done/total*100);
  document.getElementById('prog-fg').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
  document.getElementById('s-pct').textContent=pct+'%';
  const banner=document.getElementById('done-banner');
  if(done===total){ banner.classList.add('show'); S[TODAY_KEY]='workout'; save(); }
  else banner.classList.remove('show');
  // 전체 타이머 표시
  if(totalSec>0) document.getElementById('total-timer-wrap').style.display='';
}

function resetWorkout(){
  if(!confirm('오늘 운동 기록을 초기화할까요?')) return;
  EX.forEach(e=>delete S[e.id]);
  delete S[TODAY_KEY];
  resetTotalTimer();
  save(); render();
}

// ── CALENDAR ──
function renderCal(){
  document.getElementById('month-title').textContent=`${viewYear}년 ${viewMonth+1}월`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const first=new Date(viewYear,viewMonth,1).getDay();
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const key=`cal_${viewYear}_${viewMonth+1}_${d}`;
    const val=S[key];
    const isToday=viewYear===now.getFullYear()&&viewMonth===now.getMonth()&&d===now.getDate();
    const cell=document.createElement('div');
    let cls='cal-cell';
    if(val==='workout') cls+=' workout';
    else if(val==='rest') cls+=' rest-day';
    else if(isToday) cls+=' today';
    cell.className=cls; cell.textContent=d;
    cell.onclick=()=>cycleDay(key,isToday);
    grid.appendChild(cell);
  }
}
function cycleDay(key,isToday){
  const cur=S[key];
  if(!cur) S[key]='workout';
  else if(cur==='workout') S[key]='rest';
  else delete S[key];
  save(); renderCal(); if(isToday) renderWorkout();
}
function moveMonth(dir){
  viewMonth+=dir;
  if(viewMonth<0){viewMonth=11;viewYear--;} if(viewMonth>11){viewMonth=0;viewYear++;}
  renderCal();
}
function resetMonth(){
  if(!confirm('이달 달력 기록을 초기화할까요?')) return;
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  for(let d=1;d<=days;d++) delete S[`cal_${viewYear}_${viewMonth+1}_${d}`];
  save(); renderCal();
}

// ── REST ──
function renderRest(){
  const list=document.getElementById('rest-list');
  list.innerHTML='';
  REST_OPTS.forEach(r=>{
    const on=get(r.id);
    const d=document.createElement('div');
    d.className='rest-item'+(on?' on':'');
    d.onclick=()=>tog(r.id);
    d.innerHTML=`
      <div class="rest-icon">${r.icon}</div>
      <div class="chk-sq">${on?'<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5L5.5 9.5L10.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <div class="rest-name">${r.name}</div>`;
    list.appendChild(d);
  });
  const memo=document.getElementById('rest-memo');
  if(memo) memo.value=S['rest_memo']||'';
}
function saveMemo(){ S['rest_memo']=document.getElementById('rest-memo').value; save(); }
function resetRest(){ REST_OPTS.forEach(r=>delete S[r.id]); delete S['rest_memo']; save(); renderRest(); }

function render(){ renderWorkout(); renderRest(); }
render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
}
</script>
</body>
